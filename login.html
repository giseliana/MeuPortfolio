<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tela de Login</title>
</head>
<body>
    <div class="barra-cabecalho">
        <p>Login</p>
    </div>
    
    <div class="container-logo">
        <img class="logo-login" src="https://www.ifmg.edu.br/portal/centrais-de-conteudos/publicacoes/informativo/183/183_arquivos/logo-1.png/@@images/image.png" alt="Logo IFMG">
    </div>
    
    <table class="layout-formulario formulario-login">
        <tr class="grupo-formulario">
            <td class="coluna-rotulo"><p>Usuário:</p></td>
            <td class="coluna-entrada">
                <input type="text" id="campo_usuario" name="usuario" placeholder="Digite seu usuário">
            </td>
        </tr>
    
        <tr class="grupo-formulario">
            <td class="coluna-rotulo"><p>Senha:</p></td>
            <td class="coluna-entrada">
                <input type="password" id="campo_senha" name="senha" placeholder="********">
            </td>
        </tr>
        
        <tr class="grupo-formulario">
            <td class="coluna-vazia"></td>
            <td class="coluna-entrada">
                <input type="submit" id="botao_entrar" class="botao-vermelho botao-vermelho-largo" value="Entrar">
            </td>
        </tr>
        
        <tr class="linha-link">
            <td class="coluna-vazia"></td>
            <td class="coluna-link">
                <a href="cadrastros.html">Não tem conta? Cadastre-se</a>
            </td>
        </tr>
    </table>
</body>
</html>
