<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário de Cadastro</title>
</head>

<body>
    <div class="barra-cabecalho">
        <h1>Formulário de Cadastro</h1>
    </div>
    <table class="layout-formulario">
        <tr class="grupo-formulario">
            <td class="coluna-rotulo"><label for="nome_completo">Seu nome:</label></td>
            <td class="coluna-entrada"><input type="text" id="nome_completo" name="nome"
                    placeholder="Digite seu nome completo"></td>
        </tr>

        <tr class="grupo-formulario">
            <td class="coluna-rotulo"><label for="restricao_alimentar">Possui alguma restrição alimentar?</label></td>
            <td class="coluna-entrada"><input type="text" id="restricao_alimentar" name="restricao"
                    placeholder="Escreva aqui..."></td>
        </tr>

        <tr class="grupo-formulario">
            <td class="coluna-rotulo"><label for="selecao_curso">Selecione o Curso:</label></td>
            <td class="coluna-entrada">
                <select id="selecao_curso" name="Curso">
                    <option value="">-- Selecione --</option>
                    <option value="I">Informática</option>
                    <option value="A">Agropecuária</option>
                    <option value="N">Nutrição</option>
                    <option value="AGM">Agrimensura</option>
                </select>
            </td>
        </tr>

        <tr class="grupo-formulario">
            <td class="coluna-rotulo"><label for="selecao_turma">Selecione a Turma:</label></td>
            <td class="coluna-entrada">
                <select id="selecao_turma" name="turma">
                    <option value="">-- Selecione --</option>
                    <option value="A1A">A1A</option>
                    <option value="A1B">A1B</option>
                    <option value="A2A">A2A</option>
                    <option value="A2B">A2B</option>
                    <option value="A3A">A3A</option>
                    <option value="A3B">A3B</option>
                    <option value="AGM1A">AGM1A</option>
                    <option value="AGM2A">AGM2A</option>
                    <option value="I1A">I1A</option>
                    <option value="I1B">I1B</option>
                    <option value="I2A">I2A</option>
                    <option value="I2B">I2B</option>
                    <option value="I3A">I3A</option>
                    <option value="I3B">I3B</option>
                    <option value="N1A">N1A</option>
                    <option value="N1B">N1B</option>
                    <option value="N2A">N2A</option>
                    <option value="N2B">N2B</option>
                    <option value="N3A">N3A</option>
                    <option value="N3B">N3B</option>
                </select>
            </td>
        </tr>

        <tr class="grupo-formulario">
            <td class="coluna-rotulo"><label for="email_contato">E-mail:</label></td>
            <td class="coluna-entrada"><input type="email" id="email_contato" name="email"
                    placeholder="Fulano@ifmg.edu.br"></td>
        </tr>

        <tr class="grupo-formulario">
            <td class="coluna-rotulo"><label for="senha_cadastro">Senha:</label></td>
            <td class="coluna-entrada"><input type="password" id="senha_cadastro" name="senha" placeholder="********">
            </td>
        </tr>

        <tr class="grupo-formulario">
            <td class="coluna-rotulo"><label for="confirmar_senha">Confirmar senha:</label></td>
            <td class="coluna-entrada"><input type="password" id="confirmar_senha" name="confirmar_senha"
                    placeholder="********"></td>
        </tr>

        <tr class="grupo-formulario linha-perfil">
            <td class="coluna-rotulo"><label>Perfil:</label></td>
            <td class="coluna-selecao">
                <input type="radio" name="perfil" id="perfil_professor" value="professor" checked>
                <label for="perfil_professor">Professor</label>
                <input type="radio" name="perfil" id="perfil_aluno" value="aluno">
                <label for="perfil_aluno">Aluno</label>
            </td>
            <td class="coluna-envio">
                <input type="button" id="botao_enviar" class="botao-verde" value="Enviar">
            </td>
        </tr>
    </table>
</body>

</html>
