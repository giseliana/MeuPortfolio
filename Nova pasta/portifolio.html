<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleportifolio.css">
    <title>Meu Portfólio</title>
</head>

<body>

    <div class="barra-cabecalho">
        <h2>Portifólio</h2>
        <nav class="links-navegacao">
            <a href="">Home</a>
            <a href="">Sobre</a>
            <a href="">Contato</a>
        </nav>
    </div>

    <div class="cabecalho">
        <div id="conteudo" class="dados">
            <h1>Giseliana</h1>
            <h3>Bem-vindo ao meu portfólio!</h3>
            <p>Aqui você encontrará uma seleção dos meus melhores trabalhos e projetos. Sinta-se à vontade para explorar
                e conhecer mais sobre minhas habilidades e experiências.</p>
            <button type="button" class="btn-contato">Conhecer mais ></button>
        </div>

        <div id="foto-perfil" class="dados">
            <img id="foto"
                src="IMG-20260424-WA0002.jpg"
                alt="Foto de perfil">
        </div>
    </div>
    <div class="work-with">
        <h2>Trabalho com:</h2>
        <div class="logos">

            <div class="logos-container">

            
                <div class="logo-par">
                    <img src="https://cdn-icons-png.flaticon.com/128/5433/5433712.png" alt="logo do java">
                    <h6>Java</h6>
                </div>

                <div class="logo-par">
                    <img src="https://cdn-icons-png.flaticon.com/128/1199/1199124.png" alt="Logo do JavaScript">
                    <h6>JavaScript</h6>
                </div>

                <div class="logo-par">
                    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png" alt="Logo do HTML5">
                    <h6>HTML</h6>
                </div>

                <div class="logo-par">
                    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968242.png" alt="Logo do CSS3">
                    <h6>CSS</h6>
                </div>

                <div class="logo-par">
                    <img src="https://cdn-icons-png.flaticon.com/128/5968/5968332.png" alt="Logo do PHP">
                    <h6>PHP</h6>
                </div>

                <div class="logo-par">
                    <img src="https://cdn-icons-png.flaticon.com/128/5968/5968313.png" alt="Logo do MySQL">
                    <h6>MySQL</h6>
                </div>

            </div>

        </div>
    </div>


</body>

</html>
